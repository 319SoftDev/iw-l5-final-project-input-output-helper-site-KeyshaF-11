      <h1>Salsa Rosada</h1>
    </div>
  </div>
</header>


<nav class="navbar">
  <ul>
    <li><a href="index.html"><img src="img/home.png" alt="Home" height="40px">Home</a></li>
    <li><a href="menu.html"><img src="img/menu.png" alt="Menu" height="40px">Menu</a></li>
    <li><a href="reserve.html"><img src="img/booking.png" alt="Reserve" height="40px">Reserve</a></li>
    <li><a href="locations.html"><img src="img/pin.png" alt="Locations" height="40px">Locations</a></li>
  </ul>


    <!-- <nav class="navbar2" style="background-color: tomato;"> -->

<main class="page-container">
  <div class="form-container">
    <h2>Reserve a Table</h2>
    <form id="reservationForm">
      <label>Name:</label>
      <input type="text" placeholder="Your Name" required>


      <label>Date:</label>
      <input type="date" required>


      <label>Time:</label>
      <input type="time" required>


      <label>Number of People:</label>
      <input type="number" min="1" value="1" required>


      <button type="submit">Reserve</button>
    </form>
  </div>
</main>


<div id="mySidebar" class="sidebar">
  <a href="javascript:void(0)" class="close-btn" onclick="closeNav()">×</a>
  <h2 style="text-align:center;">Your Bag</h2>
  <div id="cartItems"></div>
  <h3 style="text-align:center;">Total: $<span id="cartTotal">0</span></h3>
  <button id="resetCart">Reset Order</button>
  <button id="purchaseBtn">Purchase</button>
</div>
