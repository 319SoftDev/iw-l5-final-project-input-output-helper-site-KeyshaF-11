      <h1>Salsa Rosada</h1>
    </div>
  </div>

<nav class="navbar">
  <ul>
    <li><a href="index.html"><img src="img/home.png" alt="Home" height="40px">Home</a></li>
    <li><a href="menu.html"><img src="img/menu.png" alt="Menu" height="40px">Menu</a></li>
    <li><a href="reserve.html"><img src="img/booking.png" alt="Reserve" height="40px">Reserve</a></li>

<main class="page-container">


 <h1 style="text-align:center;">Our Menu</h1>


 <div class="listProducts">


   <div class="menu-item">
     <img src="img/arepa.png">
     <h3>Arepa</h3>
     <div class="price">$3.00</div>
     <button class="button" data-name="Arepa" data-price="3">
       Add To Bag <img src="img/plus.png">
     </button>
   </div>


   <div class="menu-item">
     <img src="img/bandeja.png">
     <h3>Bandeja Paisa</h3>
     <div class="price">$14.80</div>
     <button class="button" data-name="Bandeja Paisa" data-price="14.8">
       Add To Bag <img src="img/plus.png">
     </button>
   </div>


   <div class="menu-item">
     <img src="img/empanada.png">
     <h3>Empanada</h3>
     <div class="price">$5.00</div>
     <button class="button" data-name="Empanada" data-price="5">
       Add To Bag <img src="img/plus.png">
     </button>
   </div>


   <div class="menu-item">
     <img src="img/bolon.jpg">
     <h3>Bolon</h3>
     <div class="price">$6.50</div>
     <button class="button" data-name="Bolon" data-price="6.5">
       Add To Bag <img src="img/plus.png">
     </button>
   </div>





 



   <div class="menu-item">
     <img src="img/alfajor.png">

     <div class="price">$14.80</div>
     <button class="button" data-name="Ceviche" data-price="14.8">
       Add To Bag <img src="img/plus.png">
     </button>
   </div>


   <div class="menu-item">
     <img src="img/plantain.jpg">
     <h3>Plantain Empanada</h3>
     <div class="price">$5.00</div>
     <button class="button" data-name="Plantain Empanada" data-price="5">
       Add To Bag <img src="img/plus.png">
     </button>
   </div>


   <div class="menu-item">
     <img src="img/asado.jpg">

     <div class="price">$6.50</div>
     <button class="button" data-name="Asado" data-price="6.5">
       Add To Bag <img src="img/plus.png">
     </button>

 </div>

<div id="mySidebar" class="sidebar">

 <h2 style="text-align:center;">Your Bag<img src="img/bag.png" width="40px" height="40px" style="margin-left: 10px; bottom: 150px;" alt="Bag"></h2>

 <h3 style="text-align:center;">Total: $<span id="cartTotal">0</span></h3>
 <button id="resetCart">Reset Order</button>

</div>
